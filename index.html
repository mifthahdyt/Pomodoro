<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Focus | Mifthaa Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700&display=swap');

        :root {
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #ffffff;
            --text-dim: #a0a0a0;
            --glow-color: rgba(255, 255, 255, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- BACKGROUND EFFECTS --- */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('latar.jpg') no-repeat center center/cover;
            z-index: -3;
            transform: scale(1.1);
            filter: brightness(0.35) grayscale(0.6);
        }

        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 10%, rgba(0,0,0,0.9) 100%);
            z-index: -2;
        }

        #stars-canvas {
            position: fixed;
            top: 0; left: 0; z-index: -1;
            pointer-events: none;
        }

        /* --- GLASS CARD --- */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            padding: 50px 40px;
            border-radius: 40px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            position: relative;
            z-index: 10;
        }

        /* Greeting Style */
        .welcome-msg {
            font-size: 0.85rem;
            color: var(--accent);
            margin-bottom: 25px;
            font-weight: 400;
            letter-spacing: 0.5px;
            opacity: 0.9;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 2.5px;
            color: var(--text-dim);
            margin-bottom: 15px;
            border: 1px solid var(--glass-border);
            text-transform: uppercase;
        }

        .timer-display {
            font-size: 7rem;
            font-weight: 200;
            margin: 5px 0;
            letter-spacing: -4px;
            line-height: 1;
            text-shadow: 0 0 40px var(--glow-color);
        }

        .session-info {
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        /* Progress Bar */
        .progress-wrapper {
            margin: 35px auto;
            position: relative;
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #fff;
            box-shadow: 0 0 15px #fff;
            transition: width 1s ease;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 35px;
        }

        button {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: white;
            color: black;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .btn-audio {
            position: fixed;
            bottom: 40px; right: 40px;
            width: 50px; height: 50px;
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .motivation-text {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 30px;
            font-style: italic;
        }

        .flash { animation: flashAnim 0.6s ease; }
        @keyframes flashAnim {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>
    <div class="vignette"></div>
    <canvas id="stars-canvas"></canvas>

    <div class="glass-card" id="main-card">
        <div class="welcome-msg">🌙 Welcome back, Mifthaa. The night is yours to focus and study ✨</div>
        
        <div id="status" class="status-badge">Ready to Start</div>
        <div id="timer" class="timer-display">25:00</div>
        
        <div id="session-count" class="session-info">Session 1 / 4</div>

        <div class="progress-wrapper">
            <div id="progress" class="progress-bar"></div>
        </div>

        <div class="controls">
            <button id="startBtn">Focus</button>
            <button id="pauseBtn">Pause</button>
            <button id="resetBtn">Reset</button>
        </div>

        <div id="motivation" class="motivation-text">"Waktunya menciptakan karya terbaikmu."</div>
    </div>

    <button id="audioToggle" class="btn-audio" title="Rain Ambience">🌧️</button>

    <audio id="rainAudio" loop preload="auto">
        <source src="rain.mp3" type="audio/mpeg">
    </audio>

    <script>
        const TIMES = { FOCUS: 25 * 60, SHORT: 5 * 60, LONG: 15 * 60 };
        const MOTIVATIONS = ["Stay sharp.", "Deep work mode.", "Flow state active.", "Enjoy your rest.", "Refresh and return."];
        
        let timeLeft = TIMES.FOCUS;
        let timerId = null;
        let session = 1;
        let mode = 'FOCUS';
        let isRainOn = false;

        const timerEl = document.getElementById('timer');
        const statusEl = document.getElementById('status');
        const sessionEl = document.getElementById('session-count');
        const progressEl = document.getElementById('progress');
        const rainAudio = document.getElementById('rainAudio');
        const motivEl = document.getElementById('motivation');
        const cardEl = document.getElementById('main-card');

        function updateUI() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            timerEl.textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            sessionEl.textContent = `Sesi ${session} / 4`;
            statusEl.textContent = mode === 'FOCUS' ? "Fokus" : (mode === 'SHORT' ? "Istirahat Pendek" : "Istirahat Panjang");

            let total = mode === 'FOCUS' ? TIMES.FOCUS : (mode === 'SHORT' ? TIMES.SHORT : TIMES.LONG);
            let perc = ((total - timeLeft) / total) * 100;
            progressEl.style.width = `${perc}%`;

            localStorage.setItem('miftha_time', timeLeft);
            localStorage.setItem('miftha_session', session);
            localStorage.setItem('miftha_mode', mode);
        }

        function startTimer() {
            if (timerId) return;
            if (isRainOn) rainAudio.play().catch(() => {});
            timerId = setInterval(() => {
                timeLeft--;
                updateUI();
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    timerId = null;
                    nextPhase();
                }
            }, 1000);
        }

        function nextPhase() {
            cardEl.classList.add('flash');
            setTimeout(() => cardEl.classList.remove('flash'), 600);

            if (mode === 'FOCUS') {
                if (session >= 4) { mode = 'LONG'; timeLeft = TIMES.LONG; }
                else { mode = 'SHORT'; timeLeft = TIMES.SHORT; }
                motivEl.textContent = "Take a deep breath.";
            } else {
                if (mode === 'LONG') session = 1; else session++;
                mode = 'FOCUS'; timeLeft = TIMES.FOCUS;
                motivEl.textContent = MOTIVATIONS[Math.floor(Math.random()*3)];
            }
            updateUI();
            startTimer();
        }

        // --- STAR ANIMATION ---
        function initStars() {
            const canvas = document.getElementById('stars-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const stars = Array.from({length: 120}, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 1.8,
                speed: Math.random() * 0.4 + 0.1,
                opacity: Math.random()
            }));

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(s => {
                    ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
                    s.y -= s.speed;
                    if (s.y < 0) s.y = canvas.height;
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        document.getElementById('startBtn').addEventListener('click', startTimer);
        document.getElementById('pauseBtn').addEventListener('click', () => {
            clearInterval(timerId);
            timerId = null;
            rainAudio.pause();
        });
        document.getElementById('resetBtn').addEventListener('click', () => {
            localStorage.clear();
            location.reload();
        });
        document.getElementById('audioToggle').addEventListener('click', function() {
            isRainOn = !isRainOn;
            this.style.background = isRainOn ? 'white' : 'var(--glass)';
            this.style.color = isRainOn ? 'black' : 'white';
            isRainOn ? rainAudio.play() : rainAudio.pause();
        });

        // --- INIT ---
        const savedTime = localStorage.getItem('miftha_time');
        if (savedTime) {
            timeLeft = parseInt(savedTime);
            session = parseInt(localStorage.getItem('miftha_session'));
            mode = localStorage.getItem('miftha_mode');
        }

        window.addEventListener('resize', () => {
            const canvas = document.getElementById('stars-canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        updateUI();
        initStars();
    </script>
</body>
</html>
