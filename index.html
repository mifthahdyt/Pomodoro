<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Focus | Tuan Muda Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;700&display=swap');

        :root {
            /* --- MODE MALAM --- */
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #ffffff;
            --text-dim: #a0a0a0;
            --glow-color: rgba(255, 255, 255, 0.3);
            --bg-gradient: radial-gradient(circle, transparent 10%, rgba(0,0,0,0.95) 100%);
            --card-shadow: rgba(0, 0, 0, 0.8);
            --star-color: #ffffff;
        }

        body.pagi-mode {
            /* --- MODE PAGI --- */
            --bg-dark: #f8fafc;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(15, 23, 42, 0.1);
            --accent: #0f172a;
            --text-dim: #64748b;
            --glow-color: rgba(15, 23, 42, 0.05);
            --bg-gradient: radial-gradient(circle, transparent 20%, rgba(248, 250, 252, 0.8) 100%);
            --card-shadow: rgba(15, 23, 42, 0.1);
            --star-color: #0f172a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--accent); height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; transition: all 0.8s ease; }

        /* --- BACKGROUND PHOTO HANDLER --- */
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3; transition: opacity 1s ease; background-position: center; background-size: cover; background-repeat: no-repeat; transform: scale(1.05); }
        #bg-malam { background-image: url('malam.png'); opacity: 1; filter: brightness(0.3); }
        #bg-pagi { background-image: url('pagi.png'); opacity: 0; filter: brightness(0.9); }
        
        body.pagi-mode #bg-malam { opacity: 0; }
        body.pagi-mode #bg-pagi { opacity: 1; }

        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-gradient); z-index: -2; transition: background 0.8s; }
        #stars-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

        /* --- TOP RIGHT --- */
        .top-right-panel { position: fixed; top: 30px; right: 30px; display: flex; flex-direction: column; align-items: flex-end; gap: 15px; z-index: 100; }
        .digital-clock { text-align: right; }
        #wita-time { font-size: 1.8rem; font-weight: 200; letter-spacing: 2px; }
        #wita-date { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; }

        .theme-switcher { display: flex; gap: 8px; }
        .theme-btn { background: var(--glass); border: 1px solid var(--glass-border); color: var(--accent); padding: 6px 15px; border-radius: 100px; font-size: 0.65rem; cursor: pointer; transition: 0.3s; font-weight: 700; text-transform: uppercase; backdrop-filter: blur(10px); }
        .theme-btn.active { background: var(--accent); color: var(--bg-dark); }

        /* --- MAIN CARD --- */
        .glass-card {
            background: var(--glass); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); padding: 50px 40px; border-radius: 40px;
            width: 90%; max-width: 500px; text-align: center; position: relative; z-index: 10;
            box-shadow: 0 25px 50px -12px var(--card-shadow); transition: all 0.8s ease;
        }

        .welcome-msg { font-size: 0.8rem; margin-bottom: 25px; opacity: 0.9; line-height: 1.6; }
        .status-badge { display: inline-block; padding: 6px 16px; background: rgba(128, 128, 128, 0.05); border-radius: 100px; font-size: 0.65rem; font-weight: 700; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 10px; border: 1px solid var(--glass-border); text-transform: uppercase; }
        .session-info { color: var(--text-dim); font-size: 0.75rem; margin-bottom: 20px; }

        .timer-display { font-size: 8rem; font-weight: 200; margin: 5px 0; letter-spacing: -5px; line-height: 1; text-shadow: 0 0 40px var(--glow-color); }
        .progress-wrapper { margin: 30px auto; width: 100%; height: 2px; background: rgba(128,128,128,0.1); overflow: hidden; }
        .progress-bar { height: 100%; width: 100%; background: var(--accent); transition: width 1s linear; }

        .mode-selector { display: flex; justify-content: center; gap: 8px; margin-bottom: 25px; }
        .mode-btn { background: var(--glass); border: 1px solid var(--glass-border); color: var(--text-dim); padding: 6px 12px; border-radius: 100px; font-size: 0.6rem; cursor: pointer; text-transform: uppercase; }
        .mode-btn.active { background: var(--accent); color: var(--bg-dark); }

        .controls { display: flex; justify-content: center; gap: 12px; }
        button.action { background: transparent; border: 1px solid var(--glass-border); color: var(--accent); padding: 12px 20px; border-radius: 12px; cursor: pointer; font-size: 0.75rem; text-transform: uppercase; min-width: 100px; transition: 0.3s; }
        button.action:hover { background: var(--accent); color: var(--bg-dark); }
        #startBtn { background: var(--accent); color: var(--bg-dark); }

        /* --- CHAT --- */
        #chat-container { position: fixed; bottom: 30px; left: 30px; width: 280px; height: 350px; display: flex; flex-direction: column; z-index: 100; }
        .chat-header { background: var(--glass); padding: 12px 15px; border-radius: 15px 15px 0 0; border: 1px solid var(--glass-border); font-size: 0.65rem; font-weight: 700; }
        #chat-messages { flex: 1; background: var(--glass); border: 1px solid var(--glass-border); border-top: none; border-radius: 0 0 15px 15px; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px; border-radius: 10px; font-size: 0.7rem; background: rgba(128,128,128,0.05); border-left: 2px solid var(--accent); color: var(--accent); }

        .btn-audio { position: fixed; bottom: 30px; right: 30px; width: 45px; height: 45px; border-radius: 12px; background: var(--glass); border: 1px solid var(--glass-border); color: var(--accent); cursor: pointer; z-index: 100; }
    </style>
</head>
<body>

    <div id="bg-malam" class="bg-layer"></div>
    <div id="bg-pagi" class="bg-layer"></div>
    <div class="vignette"></div>
    <canvas id="stars-canvas"></canvas>

    <div class="top-right-panel">
        <div class="digital-clock">
            <div id="wita-time">00:00:00</div>
            <div id="wita-date">Memuat...</div>
        </div>
        <div class="theme-switcher">
            <button id="malamBtn" class="theme-btn active" onclick="setTheme('malam')">Malam 🌙</button>
            <button id="pagiBtn" class="theme-btn" onclick="setTheme('pagi')">Pagi ☀️</button>
        </div>
    </div>

    <div id="chat-container">
        <div class="chat-header">MENTOR MONITORING</div>
        <div id="chat-messages"></div>
    </div>

    <div class="glass-card">
        <div class="welcome-msg" id="welcome-txt">🌙 Selamat datang, Tuan Muda. <br>Waktu ini milikmu untuk fokus dan belajar ✨</div>
        <div id="status" class="status-badge">Belajar</div>
        <div id="session-count" class="session-info">Sesi 1 / 4</div>

        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('normal')">Normal</button>
            <button class="mode-btn" onclick="setMode('fokus')">Fokus</button>
            <button class="mode-btn" onclick="setMode('tekanan')">Tekanan</button>
            <button class="mode-btn" onclick="setMode('silent')">Revenge</button>
        </div>

        <div id="timer" class="timer-display">25:00</div>
        <div class="progress-wrapper"><div id="progress-bar" class="progress-bar"></div></div>

        <div class="controls">
            <button id="startBtn" class="action" onclick="toggleTimer()">Start</button>
            <button id="pauseBtn" class="action" onclick="pauseTimer()">Pause</button>
            <button id="resetBtn" class="action" onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <button id="audioToggle" class="btn-audio" onclick="toggleRain()">🌧️</button>
    
    <audio id="rainAudio" loop><source src="rain.mp3" type="audio/mpeg"></audio>
    <audio id="notifAudio"><source src="notif.mp3" type="audio/mpeg"></audio>
    <audio id="alarmAudio"><source src="alarm.mp3" type="audio/mpeg"></audio>

    <script>
        // --- REAL TIME CLOCK ---
        function updateClock() {
            const now = new Date();
            const options = { timeZone: 'Asia/Makassar', hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' };
            const dateOptions = { timeZone: 'Asia/Makassar', weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' };
            document.getElementById('wita-time').textContent = now.toLocaleTimeString('id-ID', options);
            document.getElementById('wita-date').textContent = now.toLocaleDateString('id-ID', dateOptions);
        }
        setInterval(updateClock, 1000); updateClock();

        // --- THEME & BACKGROUND ---
        function setTheme(theme) {
            const body = document.body;
            const welcomeTxt = document.getElementById('welcome-txt');
            if (theme === 'pagi') {
                body.classList.add('pagi-mode');
                document.getElementById('pagiBtn').classList.add('active');
                document.getElementById('malamBtn').classList.remove('active');
                welcomeTxt.innerHTML = "☀️ Selamat pagi, Tuan Muda. <br>Fajar baru, semangat baru untuk belajar ✨";
            } else {
                body.classList.remove('pagi-mode');
                document.getElementById('malamBtn').classList.add('active');
                document.getElementById('pagiBtn').classList.remove('active');
                welcomeTxt.innerHTML = "🌙 Selamat datang, Tuan Muda. <br>Waktu ini milikmu untuk fokus dan belajar ✨";
            }
        }

        // --- TIMER LOGIC ---
        let timeLeft = 25 * 60;
        let initialTime = 25 * 60;
        let timerId = null;
        let mentorId = null;
        let session = 1;
        let isBreak = false;
        let currentMode = 'normal';

        const timerEl = document.getElementById('timer');
        const progressEl = document.getElementById('progress-bar');
        const alarmAudio = document.getElementById('alarmAudio');

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            timerEl.textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            progressEl.style.width = `${(timeLeft / initialTime) * 100}%`;
            document.getElementById('status').textContent = isBreak ? "Istirahat" : "Belajar";
            document.getElementById('session-count').textContent = `Sesi ${session} / 4`;
        }

        function toggleTimer() {
            if (timerId) return;
            startEngine();
            document.getElementById('startBtn').textContent = "Running";
        }

        function pauseTimer() {
            clearInterval(timerId); timerId = null;
            clearInterval(mentorId);
            document.getElementById('startBtn').textContent = "Start";
        }

        function resetTimer() {
            pauseTimer();
            isBreak = false; timeLeft = 25 * 60; initialTime = 25 * 60;
            updateDisplay();
        }

        function startEngine() {
            if (timerId) clearInterval(timerId);
            startChat();
            timerId = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--; updateDisplay();
                } else {
                    alarmAudio.play();
                    handleNext();
                }
            }, 1000);
        }

        function handleNext() {
            pauseTimer();
            if (!isBreak) {
                if (session < 4) {
                    session++; alert("Sesi belajar selesai. Waktunya istirahat (5 Menit).");
                    isBreak = true; timeLeft = 5 * 60; initialTime = 5 * 60;
                } else {
                    session = 1; alert("Semua sesi selesai!"); resetTimer(); return;
                }
            } else {
                isBreak = false; timeLeft = 25 * 60; initialTime = 25 * 60;
                alert("Istirahat selesai. Kembali belajar.");
            }
            updateDisplay(); startEngine();
        }

        // --- MENTOR CHAT ---
        function startChat() {
            if (currentMode === 'normal' || currentMode === 'silent' || isBreak) return;
            mentorId = setInterval(() => {
                const msg = document.createElement('div');
                msg.className = 'message';
                msg.textContent = currentMode === 'fokus' ? "Terus fokus, Tuan Muda." : "Waktu terus berjalan, jangan malas!";
                document.getElementById('chat-messages').appendChild(msg);
                document.getElementById('chat-messages').scrollTop = 9999;
                if (document.getElementById('chat-messages').childElementCount > 5) document.getElementById('chat-messages').removeChild(document.getElementById('chat-messages').firstChild);
            }, 15000);
        }

        function setMode(m) {
            currentMode = m;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.toggle('active', btn.textContent.toLowerCase() === m));
            clearInterval(mentorId); if (timerId) startChat();
        }

        function toggleRain() {
            const rain = document.getElementById('rainAudio');
            const btn = document.getElementById('audioToggle');
            if (rain.paused) { rain.play(); btn.style.background = "var(--accent)"; btn.style.color = "var(--bg-dark)"; }
            else { rain.pause(); btn.style.background = "var(--glass)"; btn.style.color = "var(--accent)"; }
        }

        // --- STARS ANIMATION ---
        const canvas = document.getElementById('stars-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function initStars() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = Array.from({length: 80}, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 1.5, speed: Math.random() * 0.2 }));
        }
        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--star-color');
            stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); s.y -= s.speed; if(s.y<0) s.y = canvas.height; });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', initStars); initStars(); animate(); updateDisplay();
    </script>
</body>
</html>
